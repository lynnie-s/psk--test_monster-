<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一秒看透你的夏日防曬人格｜PSK 深海美肌專家</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --g0:#f0faf5;--g1:#d4f0e3;--g2:#5DCAA5;--g3:#1D9E75;--g4:#0F6E56;--g5:#085041;
  --sand:#f7f4ee;--sand2:#ede8de;
  --text:#1a1a1a;--text2:#555;--text3:#999;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --r-md:8px;--r-lg:14px;--r-xl:20px;
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--sand);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem;color:var(--text);}

/* ── CARD ── */
.card{width:100%;max-width:600px;background:#fff;border-radius:24px;overflow:hidden;box-shadow:0 4px 32px rgba(0,0,0,0.08);}

/* ── COVER ── */
.cover{
  background: var(--sand);
  padding: 0;
  position: relative;
  min-height: 580px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  overflow: hidden;
}
.cover-bg{
  position:absolute;inset:0;
  background: linear-gradient(160deg, #e8f7ef 0%, #f5f0e8 55%, #fce8d5 100%);
}
.cover-sun{
  position:absolute;top:-60px;right:-60px;
  width:260px;height:260px;
  background:radial-gradient(circle, rgba(255,210,120,0.35) 0%, rgba(255,210,120,0) 70%);
  border-radius:50%;
}
.cover-wave{
  position:absolute;bottom:0;left:0;right:0;
  height:120px;
  background: linear-gradient(to top, rgba(93,202,165,0.15) 0%, transparent 100%);
}

.cover-chars{
  position:absolute;
  bottom: 0; left:0; right:0;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  gap:0;
  height: 380px;
  pointer-events:none;
}
.cover-char{
  width:25%;
  display:flex;
  align-items:flex-end;
  justify-content:center;
}
.cover-char img{
  width:100%;
  max-width:160px;
  height:340px;
  object-fit:contain;
  object-position:bottom center;
  display:block;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.06));
}

.cover-content{
  position:relative;
  z-index:2;
  text-align:center;
  padding: 2rem 2rem 2.5rem;
  background: linear-gradient(to top, #fff 60%, transparent 100%);
  width:100%;
}
.cover-brand{
  font-size:11px;letter-spacing:.18em;color:var(--g4);
  text-transform:uppercase;margin-bottom:1rem;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.cover-brand::before,.cover-brand::after{
  content:'';display:inline-block;width:24px;height:1px;background:var(--g3);
}
.cover-title{
  font-family:'Noto Serif TC',serif;
  font-size:28px;font-weight:700;
  line-height:1.35;
  color:var(--text);
  margin-bottom:.75rem;
}
.cover-sub{
  font-size:14px;color:var(--text2);line-height:1.7;
  margin-bottom:1.75rem;
}
.btn-start{
  display:inline-block;
  background:var(--g4);color:#fff;
  border:none;padding:14px 44px;
  border-radius:99px;
  font-size:15px;font-weight:500;
  cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;
  transition:background .2s,transform .15s;
  letter-spacing:.04em;
}
.btn-start:hover{background:var(--g5);transform:translateY(-1px);}
.cover-note{font-size:12px;color:var(--text3);margin-top:.75rem;}

/* ── QUIZ ── */
.quiz-body{padding:2rem 2rem 2.5rem;}
.prog-label{font-size:12px;color:var(--text3);margin-bottom:.4rem;text-align:right;}
.prog-wrap{background:var(--sand2);border-radius:99px;height:3px;margin-bottom:2rem;overflow:hidden;}
.prog-fill{height:100%;background:var(--g2);border-radius:99px;transition:width .5s ease;}
.qa{animation:fu .4s ease forwards;}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.qnum{font-size:11px;letter-spacing:.12em;color:var(--g3);margin-bottom:.6rem;font-weight:500;}
.qtext{font-family:'Noto Serif TC',serif;font-size:19px;line-height:1.65;margin-bottom:1.5rem;}
.opts{display:flex;flex-direction:column;gap:9px;}
.opt{
  display:flex;align-items:flex-start;gap:13px;
  padding:13px 16px;
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  background:#fff;cursor:pointer;text-align:left;
  transition:all .16s;width:100%;color:var(--text);
}
.opt:hover{border-color:var(--g2);background:var(--g0);}
.opt.sel{border-color:var(--g3);background:var(--g0);}
.opt-l{
  flex-shrink:0;width:25px;height:25px;border-radius:50%;
  border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:var(--text3);font-weight:500;
  margin-top:2px;transition:all .16s;
}
.opt:hover .opt-l,.opt.sel .opt-l{background:var(--g3);border-color:var(--g3);color:#fff;}
.opt-t{font-size:14px;line-height:1.7;}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:1.5rem;}
.btn-next{
  background:var(--g4);color:#fff;border:none;
  padding:12px 28px;border-radius:99px;
  font-size:14px;cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;
  transition:background .18s;margin-left:auto;
}
.btn-next:hover{background:var(--g5);}
.btn-next:disabled{opacity:.3;cursor:not-allowed;}
.btn-back{
  background:none;border:none;color:var(--text3);
  font-size:13px;cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;padding:8px 0;
}
.btn-back:hover{color:var(--text);}

/* ── RESULT ── */
.res-area{animation:fu .5s ease forwards;}
.res-img-wrap{
  margin:-2rem -2rem 0;
  background:var(--sand);
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  padding: 2rem 2rem 0;
  min-height:420px;
}
.res-img-wrap img{
  width:88%;max-width:380px;
  height:440px;
  object-fit:contain;
  object-position:bottom center;
  display:block;
  filter: drop-shadow(0 4px 16px rgba(0,0,0,0.08));
}
.res-label-row{
  display:flex;flex-direction:column;align-items:center;
  padding:1.25rem 0 1rem;text-align:center;
  border-bottom:1px solid var(--border);
  margin-bottom:1.25rem;
}
.res-type{font-size:11px;letter-spacing:.15em;color:var(--g4);margin-bottom:.3rem;}
.res-name{font-family:'Noto Serif TC',serif;font-size:26px;font-weight:700;color:var(--text);}
.res-desc{font-size:14px;line-height:1.95;color:var(--text2);margin-bottom:1.5rem;}
.traits{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:1.5rem;}
.trait{font-size:12px;border:1px solid var(--border2);padding:4px 13px;border-radius:99px;color:var(--text2);}
.divider{height:1px;background:var(--border);margin:1.5rem 0;}
.sec-label{font-size:11px;letter-spacing:.12em;color:var(--text3);margin-bottom:.75rem;}
.product-card{
  border:1px solid var(--border);border-radius:var(--r-lg);
  padding:1.25rem;margin-bottom:1.5rem;
  display:flex;gap:1rem;align-items:flex-start;background:#fff;
}
.prod-icon{
  width:48px;height:48px;background:var(--g0);
  border-radius:var(--r-md);display:flex;
  align-items:center;justify-content:center;
  flex-shrink:0;font-size:22px;
}
.prod-title{font-size:14px;font-weight:500;margin-bottom:4px;}
.prod-sub{font-size:12px;color:var(--text2);line-height:1.6;}
.prod-tag{
  display:inline-block;font-size:11px;
  background:var(--g0);color:var(--g4);
  padding:2px 10px;border-radius:99px;margin-top:6px;
}
.scores{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.5rem;}
.sc{background:var(--sand);border-radius:var(--r-md);padding:10px 14px;}
.sc-l{font-size:11px;color:var(--text3);margin-bottom:6px;}
.sc-bg{height:3px;border-radius:99px;overflow:hidden;background:var(--sand2);}
.sc-fg{height:100%;background:var(--g2);border-radius:99px;}
.btn-share{
  width:100%;padding:14px;
  background:var(--g4);color:#fff;border:none;
  border-radius:99px;font-size:14px;cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;
  margin-bottom:10px;transition:background .18s;
}
.btn-share:hover{background:var(--g5);}
.btn-retry{
  width:100%;padding:12px;background:none;
  color:var(--text2);border:1px solid var(--border2);
  border-radius:99px;font-size:13px;cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;transition:all .18s;
}
.btn-retry:hover{border-color:var(--g2);color:var(--g4);}

@media(max-width:480px){
  .cover-title{font-size:23px;}
  .quiz-body{padding:1.5rem 1.25rem 2rem;}
  .qtext{font-size:17px;}
  .scores{grid-template-columns:1fr;}
  .cover-char img{height:180px;}
  .cover-chars{height:220px;}
}


</style>
</head>

    desc:"你的肌膚悄悄告訴我，你做選擇時會想到更遠的地方與更久以後。你會留意內容物對自己狀態的影響，也在意生產與使用過程是否對環境溫和。當保護、舒適與信念能同時被照顧到時，你才會真正感到心安。",
    traits:["環保意識","永續選擇","信念消費","愛地球"],
    product:"純物理全能潤色隔離霜 SPF50+★★★",
    productDesc:"符合全球最嚴謹帛琉海洋保護友善規範，無添加香料酒精，對肌膚與地球都溫柔",
    productTag:"適合：海洋友善 × 環境意識 × 敏感肌"
  }
};

const nameMap={G:"全防守",R:"隨心派",C:"成分控",E:"安心綠"};
let cur=0,answers=[],sel=null;

function startQuiz(){
  document.getElementById('s-intro').style.display='none';
  document.getElementById('s-quiz').style.display='block';
  renderQ();
}

function renderQ(){
  sel=null;
  const q=questions[cur];
  const L=['A','B','C','D'];
  const pct=Math.round(((cur+1)/questions.length)*100);
  document.getElementById('prog-label').textContent=`${cur+1} / ${questions.length}`;
  document.getElementById('prog-bar').style.width=pct+'%';
  let html=`<div class="qnum">Q${String(cur+1).padStart(2,'0')}</div>
  <div class="qtext">${q.text}</div>
  <div class="opts">`;
  q.options.forEach((o,i)=>{
    html+=`<button class="opt" onclick="selectOpt(this,${i})">
      <span class="opt-l">${L[i]}</span>
      <span class="opt-t">${o.text}</span>
    </button>`;
  });
  html+=`</div><div class="nav">
    ${cur>0?'<button class="btn-back" onclick="goBack()">← 上一題</button>':'<div></div>'}
    <button class="btn-next" id="btn-next" onclick="nextQ()" disabled>${cur<questions.length-1?'下一題 →':'看結果 →'}</button>
  </div>`;
  const area=document.getElementById('qa');
  area.style.animation='none';area.offsetHeight;
  area.style.animation='fu .4s ease forwards';
  area.innerHTML=html;
}

function selectOpt(el,idx){
  document.querySelectorAll('.opt').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');sel=idx;
  document.getElementById('btn-next').disabled=false;
}

function goBack(){
  if(cur>0){answers.pop();cur--;renderQ();}
}

function nextQ(){
  if(sel===null)return;
  answers.push(questions[cur].options[sel].type);
  if(cur<questions.length-1){cur++;renderQ();}
  else showResult();
}

function showResult(){
  const counts={G:0,R:0,C:0,E:0};
  answers.forEach(t=>counts[t]++);
  const winner=Object.keys(counts).reduce((a,b)=>counts[a]>=counts[b]?a:b);
  const r=results[winner];
  document.getElementById('s-quiz').style.display='none';
  const el=document.getElementById('s-result');
  el.style.display='block';
  const total=questions.length;
  const scores=Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([k,v])=>{
    return {label:nameMap[k],pct:Math.round((v/total)*100)};
  });
  const scHTML=scores.map(s=>`
    <div class="sc">
      <div class="sc-l">${s.label}</div>
      <div class="sc-bg"><div class="sc-fg" style="width:${s.pct}%"></div></div>
    </div>`).join('');
  const trHTML=r.traits.map(t=>`<span class="trait">${t}</span>`).join('');
  el.innerHTML=`<div class="res-area">
    <div class="res-img-wrap">
      <img src="${resultImages[winner]}" alt="${r.name}">
    </div>
    <div class="res-label-row">
      <div class="res-type">你的防曬人格</div>
      <div class="res-name">${r.name}</div>
    </div>
    <p class="res-desc">${r.desc}</p>
    <div class="traits">${trHTML}</div>
    <div class="divider"></div>
    <div class="sec-label">為你推薦</div>
    <div class="product-card">
      <div class="prod-icon">🧴</div>
      <div>
        <div class="prod-title">PSK ${r.product}</div>
        <div class="prod-sub">${r.productDesc}</div>
        <span class="prod-tag">${r.productTag}</span>
      </div>
    </div>
    <div class="sec-label">你的防曬傾向分析</div>
    <div class="scores">${scHTML}</div>
    <button class="btn-share" onclick="shareRes('${r.name}')">分享我的防曬人格</button>
    <button class="btn-retry" onclick="retryQuiz()">重新測驗</button>
  </div>`;
  el.scrollIntoView({behavior:'smooth',block:'start'});
}

function shareRes(name){
  const text=`我是「${name}」！快來測測你的夏日防曬人格 ☀️`;
  if(navigator.share){navigator.share({title:'一秒看透你的夏日防曬人格',text});}
  else if(navigator.clipboard){navigator.clipboard.writeText(text).then(()=>alert('結果已複製，快去分享！'));}
}

function retryQuiz(){
  cur=0;answers=[];sel=null;
  document.getElementById('s-result').style.display='none';
  document.getElementById('s-result').innerHTML='';
  document.getElementById('s-intro').style.display='flex';
}
</script>
</body>
</html>
